<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- MODERN COLORFUL CSS THEME --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent-success: #10b981;
            --accent-success-light: #e6f4ea;
            --accent-danger: #ef4444;
            --accent-danger-light: #fde8e8;
            --accent-price: #059669;
            
            --bg-tiffin: #3b82f6;
            --bg-lunch: #f59e0b;
            --bg-tea: #a855f7;

            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 10px 25px -5px rgba(79, 70, 229, 0.1);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 35px;
            box-shadow: var(--shadow-md);
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        h3.category-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3.category-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .admin-btn {
            background: #f1f5f9;
            color: var(--text-main);
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .admin-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .admin-active #toggle-admin {
            background: var(--text-main);
            color: #ffffff;
        }

        #admin-panel {
            display: none;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-sm);
            background: #ffffff;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            flex: 1;
            min-width: 130px;
            transition: var(--transition);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        #add-item-btn {
            background: var(--primary);
            color: #ffffff;
            flex: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        #add-item-btn:hover {
            background: var(--primary-hover);
        }

        .category-section {
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .item-info {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }

        .item-quantity {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.85rem;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 20px;
        }

        /* Price display tags */
        .price-display {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-price);
            background: #d1fae5;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
        }

        .admin-active .price-display {
            display: none; /* Hide static price when admin edits */
        }

        /* Inline Price Input for Admin Mode */
        .price-input-inline {
            display: none;
            width: 70px;
            padding: 4px 8px;
            border: 1px solid var(--accent-price);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-price);
            background: #fff;
        }

        .admin-active .price-input-inline {
            display: inline-block; /* Show input box only in admin mode */
        }

        #list-Tiffin li { border-left: 4px solid var(--bg-tiffin); }
        #list-Lunch li { border-left: 4px solid var(--bg-lunch); }
        #list-Tea li { border-left: 4px solid var(--bg-tea); }

        .action-btns {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 12px;
        }

        .btn-check, .btn-delete {
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-check {
            background: var(--accent-success-light);
            color: var(--accent-success);
        }

        .btn-check:hover {
            background: var(--accent-success);
            color: #ffffff;
            transform: scale(1.08);
        }

        .btn-delete {
            display: none;
            background: var(--accent-danger-light);
            color: var(--accent-danger);
        }

        .btn-delete:hover {
            background: var(--accent-danger);
            color: #ffffff;
            transform: scale(1.08);
        }

        .admin-active .btn-delete {
            display: flex;
        }

        #purchased-section {
            margin-top: 45px;
            padding-top: 25px;
            border-top: 2px dashed #e2e8f0;
        }

        #purchased-list li {
            background: #f8fafc;
            border-left: 4px solid #cbd5e1;
            box-shadow: none;
        }

        #purchased-list li .item-name-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Bottom Sticky Total Bar Layout */
        .total-sticky-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 540px;
            background: #1e293b;
            color: #ffffff;
            padding: 18px 30px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
        }

        .total-label {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <header>
            <h1>Market List</h1>
            <button class="admin-btn" id="toggle-admin">Admin Mode</button>
        </header>

        <div id="admin-panel">
            <h3>Add New Item</h3>
            <div class="form-group">
                <input type="text" id="item-name" placeholder="Item Name" required>
                <input type="text" id="item-qty" placeholder="Qty (e.g., 1kg)" required>
                <select id="item-category">
                    <option value="Tiffin">Tiffin</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Tea">Tea</option>
                </select>
                <button id="add-item-btn">Add</button>
            </div>
        </div>

        <div id="shopping-lists">
            <div class="category-section">
                <h3 class="category-title">Tiffin</h3>
                <ul id="list-Tiffin"></ul>
            </div>

            <div class="category-section">
                <h3 class="category-title">Lunch</h3>
                <ul id="list-Lunch"></ul>
            </div>

            <div class="category-section">
                <h3 class="category-title">Tea</h3>
                <ul id="list-Tea"></ul>
            </div>
        </div>

        <div id="purchased-section">
            <h3 class="category-title">Purchased Items</h3>
            <ul id="purchased-list"></ul>
        </div>
    </div>

    <div class="total-sticky-bar">
        <div class="total-label">Total Amount Paid</div>
        <div class="total-amount" id="grand-total">₹0.00</div>
    </div>

    <script>
        // Paste your configuration here
        const firebaseConfig = {
            apiKey: "AIzaSyCS_dt1nt3t5_KpWtOsQ872fDA2OroBuyk",
  authDomain: "item-list-9b262.firebaseapp.com",
  databaseURL: "https://item-list-9b262-default-rtdb.firebaseio.com",
  projectId: "item-list-9b262",
  storageBucket: "item-list-9b262.firebasestorage.app",
  messagingSenderId: "428255435202",
  appId: "1:428255435202:web:dccacd65de5af672435e5b",
  measurementId: "G-ZWNEQW54M2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const itemsCollection = db.collection('marketItems');

        const toggleAdminBtn = document.getElementById('toggle-admin');
        const adminPanel = document.getElementById('admin-panel');
        const mainContainer = document.getElementById('main-container');
        const addItemBtn = document.getElementById('add-item-btn');
        
        const listTiffin = document.getElementById('list-Tiffin');
        const listLunch = document.getElementById('list-Lunch');
        const listTea = document.getElementById('list-Tea');
        const purchasedList = document.getElementById('purchased-list');
        const grandTotalDisplay = document.getElementById('grand-total');

        // Toggle Admin panel view layout rules
        toggleAdminBtn.addEventListener('click', () => {
            if (adminPanel.style.display === 'none' || adminPanel.style.display === '') {
                adminPanel.style.display = 'block';
                mainContainer.classList.add('admin-active');
                toggleAdminBtn.textContent = 'Exit Admin';
            } else {
                adminPanel.style.display = 'none';
                mainContainer.classList.remove('admin-active');
                toggleAdminBtn.textContent = 'Admin Mode';
            }
        });

        // Add element
        addItemBtn.addEventListener('click', () => {
            const name = document.getElementById('item-name').value.trim();
            const qty = document.getElementById('item-qty').value.trim();
            const category = document.getElementById('item-category').value;

            if (name === '' || qty === '') {
                alert('Please enter Name and Quantity');
                return;
            }

            itemsCollection.add({
                name: name,
                quantity: qty,
                category: category,
                purchased: false,
                price: 0, 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                document.getElementById('item-name').value = '';
                document.getElementById('item-qty').value = '';
            });
        });

        // Instant Move To Purchased (No Popups!)
        function moveToPurchased(id) {
            itemsCollection.doc(id).update({
                purchased: true
            });
        }

        // Inline Price Database Save Event
        function saveInlinePrice(id, newPriceValue) {
            const parsingPrice = parseFloat(newPriceValue);
            const verifiedPrice = isNaN(parsingPrice) || parsingPrice < 0 ? 0 : parsingPrice;
            
            itemsCollection.doc(id).update({
                price: verifiedPrice
            });
        }

        function deleteItem(id) {
            if(confirm("Delete this item permanently?")) {
                itemsCollection.doc(id).delete();
            }
        }

        // Real-time Database Snapshot Render Processing
        itemsCollection.orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            listTiffin.innerHTML = '';
            listLunch.innerHTML = '';
            listTea.innerHTML = '';
            purchasedList.innerHTML = '';
            
            let accumulatedTotalSum = 0;

            snapshot.forEach(doc => {
                const item = doc.data();
                const id = doc.id;
                const itemPrice = item.price || 0;

                const li = document.createElement('li');
                
                // Item Info Container
                const infoDiv = document.createElement('div');
                infoDiv.className = 'item-info';
                
                if (item.purchased) {
                    accumulatedTotalSum += itemPrice;

                    // Text Info
                    const textSpan = document.createElement('span');
                    textSpan.className = 'item-name-text';
                    textSpan.textContent = item.name;

                    const qtySpan = document.createElement('span');
                    qtySpan.className = 'item-quantity';
                    qtySpan.textContent = item.quantity;

                    // Static Price Display (for normal mode)
                    const staticPriceSpan = document.createElement('span');
                    staticPriceSpan.className = 'price-display';
                    staticPriceSpan.textContent = `₹${itemPrice.toFixed(2)}`;

                    // Editable Input Field (for Admin Mode)
                    const priceInput = document.createElement('input');
                    priceInput.type = 'number';
                    priceInput.className = 'price-input-inline';
                    priceInput.value = itemPrice === 0 ? '' : itemPrice;
                    priceInput.placeholder = '₹0.00';
                    priceInput.step = '0.01';
                    
                    // Save when admin clicks away or presses Enter
                    priceInput.onblur = () => saveInlinePrice(id, priceInput.value);
                    priceInput.onkeydown = (e) => { if(e.key === 'Enter') priceInput.blur(); };

                    infoDiv.appendChild(textSpan);
                    infoDiv.appendChild(qtySpan);
                    infoDiv.appendChild(staticPriceSpan);
                    infoDiv.appendChild(priceInput);
                } else {
                    infoDiv.innerHTML = `<span>${item.name}</span> <span class="item-quantity">${item.quantity}</span>`;
                }
                li.appendChild(infoDiv);

                // Action Controls Container
                const actionDiv = document.createElement('div');
                actionDiv.className = 'action-btns';

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = () => deleteItem(id);
                actionDiv.appendChild(deleteBtn);

                if (!item.purchased) {
                    const checkBtn = document.createElement('button');
                    checkBtn.className = 'btn-check';
                    checkBtn.innerHTML = '✓';
                    checkBtn.onclick = () => moveToPurchased(id);
                    actionDiv.appendChild(checkBtn);
                }

                li.appendChild(actionDiv);

                // Append destination sorting 
                if (item.purchased) {
                    purchasedList.appendChild(li);
                } else {
                    if (item.category === 'Tiffin') listTiffin.appendChild(li);
                    if (item.category === 'Lunch') listLunch.appendChild(li);
                    if (item.category === 'Tea') listTea.appendChild(li);
                }
            });

            // Refresh Grand Total Display
            grandTotalDisplay.textContent = `₹${accumulatedTotalSum.toFixed(2)}`;
        });
    </script>
</body>
</html>
